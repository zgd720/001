<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项管理</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-tasks"></i> 待办事项管理</h1>
            <div class="header-stats">
                <span id="totalTasks">0</span> 个任务 | 
                <span id="completedTasks">0</span> 已完成
            </div>
        </header>

        <main class="main-content">
            <section class="task-form-section">
                <h2>添加新任务</h2>
                <form id="taskForm" class="task-form">
                    <div class="form-group">
                        <label for="taskTitle">任务标题 *</label>
                        <input type="text" id="taskTitle" placeholder="输入任务标题" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskDescription">任务描述</label>
                        <textarea id="taskDescription" placeholder="输入任务描述（可选）"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskDeadline">截止日期</label>
                            <input type="date" id="taskDeadline">
                        </div>
                        
                        <div class="form-group">
                            <label for="taskPriority">优先级</label>
                            <select id="taskPriority">
                                <option value="low">低</option>
                                <option value="medium" selected>中</option>
                                <option value="high">高</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus"></i> 添加任务
                    </button>
                </form>
            </section>

            <section class="task-list-section">
                <div class="task-filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="pending">待完成</button>
                    <button class="filter-btn" data-filter="completed">已完成</button>
                    <button class="filter-btn" data-filter="high">高优先级</button>
                </div>
                
                <div id="taskList" class="task-list">
                    <!-- 任务列表将在这里动态生成 -->
                </div>
                
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <p>暂无任务，请添加您的第一个任务</p>
                </div>
            </section>
        </main>
    </div>

    <!-- 编辑任务模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑任务</h3>
                <span class="close-btn" id="closeModal">&times;</span>
            </div>
            <form id="editForm" class="modal-body">
                <input type="hidden" id="editTaskId">
                
                <div class="form-group">
                    <label for="editTaskTitle">任务标题 *</label>
                    <input type="text" id="editTaskTitle" required>
                </div>
                
                <div class="form-group">
                    <label for="editTaskDescription">任务描述</label>
                    <textarea id="editTaskDescription"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="editTaskDeadline">截止日期</label>
                        <input type="date" id="editTaskDeadline">
                    </div>
                    
                    <div class="form-group">
                        <label for="editTaskPriority">优先级</label>
                        <select id="editTaskPriority">
                            <option value="low">低</option>
                            <option value="medium">中</option>
                            <option value="high">高</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="editTaskStatus">任务状态</label>
                    <select id="editTaskStatus">
                        <option value="pending">待完成</option>
                        <option value="completed">已完成</option>
                    </select>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelEdit">取消</button>
                    <button type="submit" class="btn btn-primary">保存更改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div id="deleteModal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>确认删除</h3>
                <span class="close-btn" id="closeDeleteModal">&times;</span>
            </div>
            <div class="modal-body">
                <p>您确定要删除这个任务吗？此操作无法撤销。</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDelete">取消</button>
                <button class="btn btn-danger" id="confirmDelete">删除</button>
            </div>
        </div>
    </div>

    <!-- 通知提示 -->
    <div id="notification" class="notification"></div>

    <script src="script.js"></script>
</body>
</html>
